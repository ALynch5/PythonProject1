<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>
</head>
<body>
    <h1>Weather Dashboard</h1>

    {% for city in cities %}
        <div>
            <h2>{{ city.name }}</h2>
            <p>{{ city.temp }} — {{ city.desc }}</p>
        </div>
        <hr>
    {% endfor %}

</body>
</html>
